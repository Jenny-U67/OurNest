<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OurNest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<!-- Firebase (free database + storage that syncs your data between the two of you) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper: #FDF1F6;
    --paper-line: #F3D3E1;
    --pink: #C2185B;
    --pink-light: #E0568B;
    --ink: #4A2740;
    --gold: #D9A5B8;
    --red-ink: #9C2D54;
    --success: #3D8361;
    --card-shadow: 0 8px 24px rgba(194,24,91,0.14);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--paper);
    background-image: repeating-linear-gradient(180deg, transparent, transparent 27px, rgba(194,24,91,0.05) 28px);
    font-family:'Inter', sans-serif;
    color: var(--ink);
    padding: 28px 16px 60px;
    min-height: 100vh;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  .cover-photo{
    width:84px; height:84px; border-radius:50%; object-fit:cover;
    border:3px solid #fff; box-shadow: var(--card-shadow); margin: 0 auto 14px; display:block;
  }
  .cover-photo-placeholder{
    width:84px; height:84px; border-radius:50%;
    border:2.5px dashed var(--gold); display:flex; align-items:center; justify-content:center;
    margin: 0 auto 14px; font-size:28px; background: rgba(217,165,184,0.12);
  }

  /* ---------- LOCK SCREEN ---------- */
  .lock-screen{
    max-width: 380px; margin: 60px auto; background: #fff; border-radius: 18px;
    padding: 36px 28px; box-shadow: var(--card-shadow); text-align:center; border: 1px solid var(--paper-line);
  }
  .lock-screen h1{ font-family:'Fraunces', serif; font-size: 24px; margin: 0 0 4px; color: var(--pink); }
  .welcome-line{ font-family:'Fraunces', serif; font-size:15px; color:var(--pink); font-weight:600; margin:0 0 16px; }
  .lock-screen p.desc{ font-size:14px; color:#6b6255; margin:0 0 22px; line-height:1.5;}
  .pin-input{
    width:100%; padding:14px 16px; font-size:20px; letter-spacing:8px; text-align:center;
    font-family:'IBM Plex Mono', monospace; border-radius:10px; border:1.5px solid var(--paper-line);
    background: var(--paper); color:var(--ink); margin-bottom:14px;
  }
  .pin-input:focus{ outline:none; border-color: var(--pink-light); }
  .btn{
    width:100%; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:600;
    background: var(--pink); color:#fff; cursor:pointer; font-family:'Inter',sans-serif;
    transition: transform .12s ease, background .15s ease;
  }
  .btn:hover{ background: var(--pink-light); }
  .btn:active{ transform: scale(0.98); }
  .btn-ghost{ background:transparent; color:var(--pink); border:1.5px solid var(--paper-line); }
  .btn-ghost:hover{ background: rgba(194,24,91,0.06); }
  .btn-sm{ width:auto; padding:8px 14px; font-size:13px; }
  .error-msg{ color:var(--red-ink); font-size:13px; margin: -6px 0 12px; min-height:16px; }
  .back-link{ background:none; border:none; color:#a49b8b; font-size:12.5px; cursor:pointer; margin-top:12px; font-family:'Inter',sans-serif; text-decoration:underline; }

  .identity-choice{ display:flex; flex-direction:column; gap:10px; margin-top:6px; }
  .identity-btn{
    padding:16px; border-radius:12px; border:1.5px solid var(--paper-line); background:var(--paper);
    cursor:pointer; font-size:15px; font-weight:600; color:var(--ink); font-family:'Fraunces', serif;
    transition: all .15s ease; display:flex; align-items:center; gap:10px; justify-content:center;
  }
  .identity-btn:hover{ border-color: var(--pink); background:#fff; }
  .identity-dot{ width:11px; height:11px; border-radius:50%; display:inline-block; }

  /* ---------- HOME HUB ---------- */
  .hub-header{ text-align:center; margin-bottom:24px; }
  .hub-header h1{ font-family:'Fraunces', serif; font-size:26px; color:var(--pink); margin:0 0 4px; }
  .hub-header p{ font-size:13.5px; color:#8a8172; margin:0; }
  .hub-cards{ display:flex; flex-direction:column; gap:14px; }
  .hub-card{
    background:#fff; border-radius:18px; padding:26px 22px; border:1px solid var(--paper-line);
    box-shadow: var(--card-shadow); cursor:pointer; display:flex; align-items:center; gap:18px;
    transition: transform .15s ease;
  }
  .hub-card:hover{ transform: translateY(-2px); border-color: var(--pink); }
  .hub-card .icon{ font-size:34px; }
  .hub-card .title{ font-family:'Fraunces', serif; font-weight:600; font-size:17px; color:var(--ink); margin-bottom:2px; }
  .hub-card .sub{ font-size:12.5px; color:#8a8172; }
  .hub-card .arrow{ margin-left:auto; font-size:20px; color:var(--paper-line); }

  /* ---------- VOICE MESSAGES ---------- */
  .voice-row{
    background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:8px;
    display:flex; flex-direction:column; gap:6px; border:1px solid var(--paper-line);
  }
  .voice-meta{ display:flex; justify-content:space-between; align-items:center; font-size:12px; color:#8a8172; }
  .voice-meta .who{ font-weight:600; color:var(--ink); }
  .voice-row audio{ width:100%; height:36px; }
  .record-panel{ background:#fff; border-radius:16px; padding:20px; border:1px solid var(--paper-line); box-shadow: var(--card-shadow); text-align:center; margin-bottom:18px; }
  .record-timer{ font-family:'IBM Plex Mono', monospace; font-size:28px; color:var(--red-ink); margin-bottom:14px; }
  .record-actions{ display:flex; gap:10px; justify-content:center; }
  .record-actions .btn{ width:auto; padding:12px 20px; }
  .mic-icon-btn{
    width:64px; height:64px; border-radius:50%; border:none; background: var(--pink); color:#fff; font-size:26px;
    cursor:pointer; box-shadow: var(--card-shadow); transition: transform .15s ease;
  }
  .mic-icon-btn:hover{ transform: scale(1.05); background: var(--pink-light); }

  /* ---------- ANNIVERSARY BANNER ---------- */
  .anniv-banner{
    background: linear-gradient(135deg, #fff 0%, var(--paper) 100%); border-radius:16px; padding:18px 20px;
    border:1.5px dashed var(--gold); text-align:center; margin-bottom:18px;
  }
  .anniv-banner.monthsary{ border-color: var(--pink); background: linear-gradient(135deg, #FFF0F5 0%, #FDF1F6 100%); }
  .anniv-banner .headline{ font-family:'Fraunces', serif; font-weight:600; font-size:15.5px; color:var(--pink); margin-bottom:4px; }
  .anniv-banner .subline{ font-size:12.5px; color:#8a8172; }

  /* ---------- CHAT ---------- */
  .chat-container{ display:flex; flex-direction:column; height:60vh; background:#fff; border-radius:16px; border:1px solid var(--paper-line); box-shadow: var(--card-shadow); overflow:hidden; }
  .chat-messages{ flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
  .chat-bubble-row{ display:flex; }
  .chat-bubble-row.me{ justify-content:flex-end; }
  .chat-bubble{ max-width:75%; padding:9px 13px; border-radius:16px; font-size:13.5px; line-height:1.4; }
  .chat-bubble-row.me .chat-bubble{ background: var(--pink); color:#fff; border-bottom-right-radius:4px; }
  .chat-bubble-row.them .chat-bubble{ background: var(--paper); color:var(--ink); border-bottom-left-radius:4px; }
  .chat-time{ font-size:9.5px; opacity:0.7; margin-top:3px; display:block; }
  .chat-input-row{ display:flex; gap:8px; padding:10px; border-top:1px solid var(--paper-line); }
  .chat-input-row input{ flex:1; }
  .chat-input-row button{ width:auto; padding:10px 16px; }
  .chat-empty{ text-align:center; color:#a49b8b; font-size:13px; margin:auto; }

  /* ---------- COVER ---------- */
  .cover{
    background: linear-gradient(145deg, var(--pink) 0%, var(--pink-light) 100%);
    border-radius: 20px; padding: 30px 26px 26px; color: #FDF1F6; position: relative;
    box-shadow: var(--card-shadow); overflow:hidden; text-align:center;
  }
  .cover::before{ content:""; position:absolute; inset:8px; border: 1px solid rgba(253,241,246,0.25); border-radius: 14px; pointer-events:none; }
  .cover-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:0.75; margin-bottom:6px; }
  .cover h1{ font-family:'Fraunces', serif; font-weight:700; font-size:26px; margin:0 0 4px; }
  .cover .welcome-sub{ font-size:13px; opacity:0.9; margin-bottom:16px; }
  .cover-total-row{ display:flex; align-items:flex-end; justify-content:center; flex-wrap:wrap; gap:16px;}
  .cover-total .label{ font-size:12px; opacity:0.75; margin-bottom:4px; }
  .cover-total .amount{ font-family:'IBM Plex Mono', monospace; font-size:34px; font-weight:600; }
  .seal{ width:76px; height:76px; border-radius:50%; border: 2.5px dashed #fff; display:flex; align-items:center; justify-content:center; flex-direction:column; transform: rotate(-7deg); flex-shrink:0; background: rgba(255,255,255,0.12); }
  .seal .pct{ font-family:'Fraunces', serif; font-weight:700; font-size:19px; color: #fff; }
  .seal .pct-label{ font-family:'IBM Plex Mono', monospace; font-size:8px; color:#fff; letter-spacing:1px; }

  .top-bar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .back-btn{
    background:#fff; border:1px solid var(--paper-line); border-radius:10px; padding:8px 14px;
    font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; font-family:'Inter',sans-serif;
    display:flex; align-items:center; gap:6px;
  }
  .back-btn:hover{ border-color:var(--pink); color:var(--pink); }
  .who-badge{ display:inline-flex; align-items:center; gap:6px; background:#fff; padding:6px 12px; border-radius:20px; font-size:12.5px; font-weight:600; color:var(--ink); border:1px solid var(--paper-line); }

  /* ---------- HOLDERS ---------- */
  .holders{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px; }
  .holder-card{ background:#fff; border-radius:16px; padding:16px 16px 14px; border:1px solid var(--paper-line); box-shadow: 0 2px 8px rgba(194,24,91,0.06); }
  .holder-name{ font-family:'Fraunces', serif; font-weight:600; font-size:15px; margin-bottom:4px; display:flex; align-items:center; gap:8px;}
  .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot-a{ background: var(--gold); }
  .dot-b{ background: var(--red-ink); }
  .holder-amount{ font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600; color:var(--pink); }
  .holder-sub{ font-size:11px; color:#8a8172; margin-top:2px; }

  /* ---------- GOAL BAR ---------- */
  .goal-block{ margin-top:16px; background:#fff; border-radius:14px; padding:14px 16px; border:1px solid var(--paper-line);}
  .goal-top{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px; color:#6b6255; margin-bottom:8px;}
  .goal-top button{ background:none; border:none; color:var(--pink); font-size:12px; cursor:pointer; text-decoration:underline; font-family:'Inter',sans-serif; padding:0;}
  .goal-track{ height:9px; background: var(--paper); border-radius:6px; overflow:hidden; border:1px solid var(--paper-line);}
  .goal-fill{ height:100%; background: linear-gradient(90deg, var(--gold), var(--pink-light)); border-radius:6px; transition: width .5s ease; }

  /* ---------- ADD ENTRY ---------- */
  .add-card{ margin-top:20px; background:#fff; border-radius:16px; padding:18px; border:1px solid var(--paper-line); box-shadow: var(--card-shadow);}
  .add-card h2{ font-family:'Fraunces', serif; font-size:16px; margin:0 0 6px; color:var(--pink);}
  .add-card .as-who{ font-size:12px; color:#8a8172; margin-bottom:14px; }
  .field-row{ display:flex; gap:10px; margin-bottom:10px; }
  .field{ flex:1; }
  .field label{ display:block; font-size:11px; color:#8a8172; margin-bottom:5px; font-weight:600; letter-spacing:.3px; }
  select, input[type=number], input[type=date], input[type=text], input[type=file]{
    width:100%; padding:10px 11px; border-radius:9px; border:1.5px solid var(--paper-line);
    background: var(--paper); font-family:'Inter', sans-serif; font-size:14px; color:var(--ink);
  }
  select:focus, input:focus{ outline:none; border-color: var(--pink-light); }

  /* ---------- LEDGER / PENDING ---------- */
  .section-title{ font-family:'Fraunces', serif; font-size:16px; color:var(--pink); margin: 22px 0 10px; display:flex; justify-content:space-between; align-items:center;}
  .section-title span.count{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:#8a8172; font-weight:400;}
  .entry-row{
    background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:8px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    border:1px solid var(--paper-line); border-left:4px solid var(--paper-line);
    animation: slideIn .25s ease;
  }
  .entry-row.who-a{ border-left-color: var(--gold); }
  .entry-row.who-b{ border-left-color: var(--red-ink); }
  .entry-row.pending{ background: #FFFBF0; }
  @keyframes slideIn{ from{ opacity:0; transform: translateY(-4px);} to{opacity:1; transform:translateY(0);} }
  .entry-left{ display:flex; flex-direction:column; gap:2px; min-width:0; }
  .entry-who{ font-size:13px; font-weight:600; }
  .entry-note{ font-size:12px; color:#8a8172; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }
  .entry-date{ font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:#a49b8b; margin-top:1px;}
  .entry-pending-label{ font-size:11px; color:#B8863B; font-style:italic; margin-top:2px; }
  .entry-right{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .entry-amount{ font-family:'IBM Plex Mono', monospace; font-size:15px; font-weight:600; color:var(--pink); }
  .del-btn{ background:none; border:none; color:#c9beac; cursor:pointer; font-size:16px; line-height:1; padding:2px 4px;}
  .del-btn:hover{ color: var(--red-ink); }
  .approve-btn, .decline-btn{
    border:none; border-radius:8px; padding:6px 10px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .approve-btn{ background: var(--success); color:#fff; }
  .decline-btn{ background: var(--red-ink); color:#fff; }
  .empty-state{ text-align:center; padding:30px 20px; color:#a49b8b; font-size:13.5px; }
  .empty-state .stamp-icon{ width:44px;height:44px;border-radius:50%; border:2px dashed var(--paper-line); display:flex; align-items:center; justify-content:center; margin:0 auto 10px; font-size:18px; }

  /* ---------- GALLERY ---------- */
  .gallery-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap:10px; }
  .gallery-item{ position:relative; border-radius:12px; overflow:hidden; background:#fff; border:1px solid var(--paper-line); aspect-ratio:1; }
  .gallery-item img, .gallery-item video{ width:100%; height:100%; object-fit:cover; display:block; }
  .gallery-overlay{
    position:absolute; inset:0; background: linear-gradient(to top, rgba(74,39,64,0.75), transparent 50%);
    display:flex; flex-direction:column; justify-content:flex-end; padding:6px; opacity:0; transition: opacity .15s ease;
  }
  .gallery-item:hover .gallery-overlay{ opacity:1; }
  .gallery-uploader{ color:#fff; font-size:9.5px; margin-bottom:3px; }
  .gallery-actions{ display:flex; gap:4px; }
  .gallery-actions button{
    background: rgba(255,255,255,0.9); border:none; border-radius:6px; font-size:11px; padding:3px 6px; cursor:pointer;
  }
  .upload-btn-wrap{ position:relative; overflow:hidden; display:inline-block; }
  .upload-btn-wrap input[type=file]{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background: var(--pink); color:#fff; padding:11px 20px; border-radius:10px; font-size:13.5px;
    box-shadow: var(--card-shadow); opacity:0; transition: all .3s ease; pointer-events:none; z-index:50; font-family:'Inter',sans-serif;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-overlay{ position:fixed; inset:0; background:rgba(74,39,64,0.45); display:flex; align-items:center; justify-content:center; z-index:60; padding:20px; }
  .modal-box{ background:#fff; border-radius:16px; padding:22px; max-width:340px; width:100%; box-shadow: var(--card-shadow);}
  .modal-box h3{ font-family:'Fraunces', serif; font-size:17px; margin:0 0 12px; color:var(--pink);}
  .modal-actions{ display:flex; gap:10px; margin-top:14px; }

  @media (max-width:420px){
    .holders{ grid-template-columns:1fr 1fr; }
    .cover h1{ font-size:22px; }
    .cover-total .amount{ font-size:26px; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCgf_utPmQjqinPdg93TAA86KjS1StcERo",
  authDomain: "our-savings-10ac1.firebaseapp.com",
  projectId: "our-savings-10ac1",
  storageBucket: "our-savings-10ac1.firebasestorage.app",
  messagingSenderId: "108247677547",
  appId: "1:108247677547:web:e824424a24f83ba0b00f2e"
};

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const CLOUDINARY_CLOUD_NAME = "ovlhguy9";
const CLOUDINARY_UPLOAD_PRESET = "lbjnodkm";
const docRef = db.collection('ipon').doc('shared');

const RELATIONSHIP_START = new Date(2023, 0, 5); // January 5, 2023

let state = {
  unlocked: false,
  currentUser: null,
  currentView: 'home',    // 'home' | 'savings' | 'gallery'
  loginStep: 'pick',      // 'pick' -> 'setpin' or 'enterpin'
  selectedIdentity: null,
  pins: { a: null, b: null },
  entries: [],
  goal: 0,
  names: { a: 'Jenny Ann', b: 'Rey' },
  coverPhotoUrl: null,
  gallery: [],
  voiceMessages: [],
  messages: [],
  isRecording: false,
  loading: true,
  uploading: false
};

const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 2200);
}

function peso(n){
  return '₱' + Number(n||0).toLocaleString('en-PH', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function saveToCloud(){
  try{
    await docRef.set({
      pins: state.pins,
      entries: state.entries,
      goal: state.goal,
      names: state.names,
      coverPhotoUrl: state.coverPhotoUrl,
      gallery: state.gallery,
      voiceMessages: state.voiceMessages,
      messages: state.messages
    }, { merge: true });
    return true;
  }catch(e){
    console.error('save failed', e);
    return false;
  }
}

function loadAll(){
  docRef.onSnapshot((snap)=>{
    const data = snap.exists ? snap.data() : {};
    state.pins = data.pins || { a: null, b: null };
    state.entries = Array.isArray(data.entries) ? data.entries : [];
    state.goal = Number(data.goal) || 0;
    state.names = data.names || { a: 'Jenny Ann', b: 'Rey' };
    state.coverPhotoUrl = data.coverPhotoUrl || null;
    state.gallery = Array.isArray(data.gallery) ? data.gallery : [];
    state.voiceMessages = Array.isArray(data.voiceMessages) ? data.voiceMessages : [];
    state.messages = Array.isArray(data.messages) ? data.messages : [];
    state.loading = false;
    render();
  }, (err)=>{
    console.error('Firestore error', err);
    state.loading = false;
    app.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#9C2D54;font-family:'Inter',sans-serif;">
      Could not connect to the database. Check your FIREBASE_CONFIG in the code, or your Firestore rules.<br><br>
      <span style="font-size:12px;color:#8a8172;">${err.message || ''}</span>
    </div>`;
  });
}

function totals(){
  let a=0, b=0;
  state.entries.filter(e=>e.status==='approved').forEach(e=>{
    if(e.person === 'a') a += Number(e.amount);
    else b += Number(e.amount);
  });
  return {a, b, combined: a+b};
}

function coverPhotoHtml(){
  return state.coverPhotoUrl
    ? `<img src="${state.coverPhotoUrl}" class="cover-photo" alt="cover">`
    : `<div class="cover-photo-placeholder">💕</div>`;
}

function relationshipDuration(){
  const now = new Date();
  let years = now.getFullYear() - RELATIONSHIP_START.getFullYear();
  let months = now.getMonth() - RELATIONSHIP_START.getMonth();
  let days = now.getDate() - RELATIONSHIP_START.getDate();
  if(days < 0){
    months--;
    const prevMonthLastDay = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    days += prevMonthLastDay;
  }
  if(months < 0){ years--; months += 12; }
  return { years, months, days };
}

function daysUntilNextAnniversary(){
  const now = new Date();
  let nextAnniv = new Date(now.getFullYear(), 0, 5);
  if(nextAnniv < now || (nextAnniv.toDateString() === now.toDateString())){
    if(nextAnniv < now) nextAnniv = new Date(now.getFullYear() + 1, 0, 5);
  }
  const msPerDay = 24*60*60*1000;
  return Math.ceil((nextAnniv - now) / msPerDay);
}

function anniversaryBannerHtml(){
  const now = new Date();
  const isMonthsary = now.getDate() === 5;
  const dur = relationshipDuration();
  const totalMonths = dur.years * 12 + dur.months;
  const daysToAnniv = daysUntilNextAnniversary();

  if(isMonthsary){
    return `
      <div class="anniv-banner monthsary">
        <div class="headline">🎉 Happy Monthsary, ${state.names.a} &amp; ${state.names.b}!</div>

function renderLock(errorMsg){
  if(state.loginStep === 'pick'){
    const rememberedId = localStorage.getItem('ournest_identity');
    if(rememberedId === 'a' || rememberedId === 'b'){
      state.selectedIdentity = rememberedId;
      state.loginStep = state.pins[rememberedId] ? 'enterpin' : 'setpin';
      renderLock();
      return;
    }
    app.innerHTML = `
      <div class="lock-screen">
        ${coverPhotoHtml()}
        <h1>OurNest</h1>
        <p class="welcome-line">Welcome, ${state.names.a} &amp; ${state.names.b} 💕</p>
        <p class="desc">Who are you? Choose your name to log in.</p>
        <div class="identity-choice">
          <button class="identity-btn" id="pickA"><span class="identity-dot dot-a"></span>${state.names.a}</button>
          <button class="identity-btn" id="pickB"><span class="identity-dot dot-b"></span>${state.names.b}</button>
        </div>
      </div>
    `;
    document.getElementById('pickA').onclick = ()=>{
      state.selectedIdentity = 'a';
      state.loginStep = state.pins.a ? 'enterpin' : 'setpin';
      render();
    };
    document.getElementById('pickB').onclick = ()=>{
      state.selectedIdentity = 'b';
      state.loginStep = state.pins.b ? 'enterpin' : 'setpin';
      render();
    };
    return;
  }

  const id = state.selectedIdentity;
  const isSetup = state.loginStep === 'setpin';
  app.innerHTML = `
    <div class="lock-screen">
      ${coverPhotoHtml()}
      <h1>OurNest</h1>
      <p class="welcome-line">Hi, ${state.names[id]}!</p>
      <p class="desc">${isSetup
        ? 'First time here — set up your own PIN (4-6 digits) that only you know.'
        : 'Enter your PIN to log in.'}</p>
      <input type="text" inputmode="numeric" maxlength="6" class="pin-input" id="pinInput" placeholder="••••">
      <div class="error-msg">${errorMsg || ''}</div>
      <button class="btn" id="pinSubmit">${isSetup ? 'Set My PIN' : 'Unlock'}</button>
      <button class="back-link" id="backBtn">&larr; Not you? Switch account</button>
    </div>
  `;
  const input = document.getElementById('pinInput');
  input.focus();
  document.getElementById('backBtn').onclick = ()=>{
    state.loginStep = 'pick';
    state.selectedIdentity = null;
    localStorage.removeItem('ournest_identity');
    render();
  };
  const submit = async ()=>{
    const val = input.value.trim();
    if(val.length < 4){ renderLock('PIN must be 4-6 digits.'); return; }
    if(isSetup){
      state.pins[id] = val;
      state.currentUser = id;
      state.unlocked = true;
      state.currentView = 'home';
      localStorage.setItem('ournest_identity', id);
      await saveToCloud();
      showToast('Your PIN is set! 🔒');
      render();
    } else {
      if(val === state.pins[id]){
        state.currentUser = id;
        state.unlocked = true;
        state.currentView = 'home';
        localStorage.setItem('ournest_identity', id);
        render();
      } else {
        renderLock('Wrong PIN, try again.');
      }
    }
  };
  document.getElementById('pinSubmit').onclick = submit;
  input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') submit(); });
}

/* ---------- ENTRIES ---------- */
async function addEntry(){
  const amountInput = document.getElementById('amountInput');
  const dateInput = document.getElementById('dateInput');
  const noteInput = document.getElementById('noteInput');
  const amount = parseFloat(amountInput.value);
  if(!amount || amount <= 0){ showToast('Please enter a valid amount.'); return; }
  const entry = {
    id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
    person: state.currentUser,
    addedBy: state.currentUser,
    status: 'pending',
    amount: amount,
    date: dateInput.value || new Date().toISOString().slice(0,10),
    note: noteInput.value.trim(),
    createdAt: Date.now()
  };
  state.entries.push(entry);
  const ok = await saveToCloud();
  showToast(ok ? 'Added! Waiting for approval. ⏳' : 'Could not save, please try again.');
  render();
}

async function approveEntry(id){
  const entry = state.entries.find(e=>e.id===id);
  if(!entry) return;
  entry.status = 'approved';
  entry.approvedBy = state.currentUser;
  await saveToCloud();
  showToast('Approved! ✅');
  render();
}

function confirmDeclineEntry(id){
  showConfirmModal('Decline this entry?', 'This will be permanently deleted.', async ()=>{
    state.entries = state.entries.filter(e=> e.id !== id);
    await saveToCloud();

    render();
  });
}

function confirmDeleteEntry(id){
  showConfirmModal('Remove this entry?', "This can't be undone once deleted.", async ()=>{
    state.entries = state.entries.filter(e=> e.id !== id);

/* ---------- GALLERY ---------- */
function compressImage(file, maxDim, quality){
  maxDim = maxDim || 1280;
  quality = quality || 0.7;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=> reject(new Error('read failed'));
    reader.onload = (e)=>{
      const img = new Image();
      img.onerror = ()=> reject(new Error('image load failed'));
      img.onload = ()=>{
        let width = img.width, height = img.height;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * (maxDim / width)); width = maxDim; }
          else{ width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob)=>{
          if(blob) resolve(blob); else reject(new Error('compression failed'));
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function uploadToCloudinary(blob, filename, onProgress){
  return new Promise((resolve, reject)=>{
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);
    xhr.upload.onprogress = (e)=>{
      if(e.lengthComputable){ onProgress(Math.round((e.loaded / e.total) * 100)); }
    };
    xhr.onload = ()=>{
      if(xhr.status >= 200 && xhr.status < 300){
        try{
          const data = JSON.parse(xhr.responseText);
          resolve(data.secure_url);
        }catch(err){ reject(err); }
      } else {
        reject(new Error('Upload failed (' + xhr.status + '): ' + xhr.responseText));
      }
    };
    xhr.onerror = ()=> reject(new Error('Network error during upload'));
    const formData = new FormData();
    formData.append('file', blob, filename);
    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
    xhr.send(formData);
  });
}

async function handleFileUpload(e){
  const files = Array.from(e.target.files || []);
  if(files.length === 0) return;
  state.uploading = true;
  render();
  const statusEl = ()=> document.getElementById('uploadStatus');

  for(let i=0; i<files.length; i++){
    const file = files[i];
    try{
      const isVideo = file.type.startsWith('video');
      const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, '_');

      let blobToUpload = file;
      if(!isVideo){
        if(statusEl()) statusEl().textContent = `Compressing photo ${i+1} of ${files.length}...`;
        try{ blobToUpload = await compressImage(file); }
        catch(compressErr){ console.warn('compression skipped', compressErr); blobToUpload = file; }
      }

      const url = await uploadToCloudinary(blobToUpload, safeName, (pct)=>{
        if(statusEl()) statusEl().textContent = `Uploading ${isVideo ? 'video' : 'photo'} ${i+1} of ${files.length}... ${pct}%`;
      });

      state.gallery.push({
        id: 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        url: url,
        type: isVideo ? 'video' : 'image',
        uploadedBy: state.currentUser,
        createdAt: Date.now()
      });
    }catch(err){
      console.error('upload failed', err);
      showToast('One file could not be uploaded. Please try again.');
    }
  }
  await saveToCloud();
  state.uploading = false;
  showToast('Uploaded to gallery! 💕');
  render();
}

function setCoverPhoto(id){
  const item = state.gallery.find(g=>g.id===id);
  if(!item) return;
  state.coverPhotoUrl = item.url;
  saveToCloud();
  showToast('Set as cover photo! 💕');
  render();
}

function confirmDeleteGalleryItem(id){
  showConfirmModal('Delete this photo/video?', "This can't be undone.", async ()=>{
    const item = state.gallery.find(g=>g.id===id);
    state.gallery = state.gallery.filter(g=>g.id!==id);
    if(item && state.coverPhotoUrl === item.url){ state.coverPhotoUrl = null; }
    await saveToCloud();
    showToast('Removed from gallery.');
    render();
  });
}

/* ---------- VOICE MESSAGES ---------- */
let mediaRecorder = null;
let audioChunks = [];
let recordingInterval = null;
let recordingSeconds = 0;

async function startRecording(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    try{
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus', audioBitsPerSecond: 24000 });
    }catch(optErr){
      mediaRecorder = new MediaRecorder(stream);
    }
    audioChunks = [];
    mediaRecorder.ondataavailable = (e)=>{ if(e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start();
    state.isRecording = true;
    recordingSeconds = 0;
    render();
    recordingInterval = setInterval(()=>{
      recordingSeconds++;
      const el = document.getElementById('recTimer');
      if(el){
        const m = Math.floor(recordingSeconds/60);
        const s = recordingSeconds % 60;
        el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
      }
    }, 1000);
  }catch(err){
    console.error('mic error', err);
    showToast('Could not access the microphone. Please allow mic permission in your browser.');
  }
}

async function stopRecordingAndSend(){
  if(!mediaRecorder){ return; }
  clearInterval(recordingInterval);
  const finished = new Promise((resolve)=>{ mediaRecorder.onstop = resolve; });
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  await finished;
  state.isRecording = false;

  const blob = new Blob(audioChunks, { type: 'audio/webm' });
  if(blob.size < 800){
    showToast('Recording was too short.');
    render();
    return;
  }

  state.uploading = true;
  render();
  try{
    const filename = `voice_${Date.now()}_${state.currentUser}.webm`;
    const url = await uploadToCloudinary(blob, filename, ()=>{});
    state.voiceMessages.push({
      id: 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
      url: url,
      sender: state.currentUser,
      createdAt: Date.now(),
      duration: recordingSeconds
    });
    await saveToCloud();
    showToast('Voice message sent! 🎙️💕');
  }catch(err){
    console.error('voice upload failed', err);
    showToast('Could not send the voice message.');
  }
  state.uploading = false;
  render();
}

function cancelRecording(){
  if(mediaRecorder){
    try{ mediaRecorder.stop(); mediaRecorder.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  }
  clearInterval(recordingInterval);
  state.isRecording = false;
  render();
}

function confirmDeleteVoice(id){
  showConfirmModal('Delete this voice message?', "This can't be undone.", async ()=>{
    state.voiceMessages = state.voiceMessages.filter(v=>v.id!==id);
    await saveToCloud();
    showToast('Voice message removed.');
    render();
  });
}

function render(){
  if(state.loading){
    app.innerHTML = `<div style="text-align:center;padding:80px 20px;color:#8a8172;font-family:'Inter',sans-serif;">Loading...</div>`;
    return;
  }
  if(!state.unlocked){ renderLock(); return; }
  if(state.currentView === 'savings'){ renderSavings(); return; }
  if(state.currentView === 'gallery'){ renderGallery(); return; }
  if(state.currentView === 'voice'){ renderVoice(); return; }
  if(state.currentView === 'chat'){ renderChat(); return; }
  renderHome();
}

render();
loadAll();
